set -sg escape-time 2

# change prefix binding
unbind C-b
set-option -g prefix C-Space
bind-key C-Space send-prefix

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

set -g mouse on

# Clipboard integration (system <-> tmux)
set -s set-clipboard on
set -as terminal-features ',*:clipboard'

# Use Wayland clipboard when available, otherwise X11 clipboard
if-shell 'command -v wl-copy >/dev/null 2>&1' 'set -s copy-command "wl-copy"' 'if-shell "command -v xclip >/dev/null 2>&1" "set -s copy-command \"xclip -selection clipboard -in\""'

# DESIGN TWEAKS

# don't do anything when a 'bell' rings
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# clock mode
setw -g clock-mode-colour '#3d88c5'

# copy mode
setw -g mode-style 'fg=colour231 bg=#3d88c5 bold'

# pane borders
set -g pane-border-style 'fg=#3d88c5'
set -g pane-active-border-style 'fg=#68a6d7'

# statusbar
set -g status-position bottom
set -g status-justify left
set -g status-style 'fg=#3d88c5'
set -g status-left ''
set -g status-right '%Y-%m-%d %H:%M '
set -g status-right-length 50
set -g status-left-length 10

setw -g window-status-current-style 'fg=colour231 bg=#3d88c5 bold'
setw -g window-status-current-format ' #I #W #F '

setw -g window-status-style 'fg=#3d88c5 dim'
setw -g window-status-format ' #I #[fg=colour7]#W #[fg=#3d88c5]#F '

setw -g window-status-bell-style 'fg=colour231 bg=#3d88c5 bold'

# messages
set -g message-style 'fg=#3d88c5 bg=colour0 bold'
